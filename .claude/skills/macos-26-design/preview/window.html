<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sample Window</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-system);
    background: #ffffff;
    color: var(--label-primary);
    min-height: 100vh;
  }

  /* ─── Menu bar ─────────────────────────────────────────── */
  .menubar {
    height: 28px; padding: 0 18px;
    display: flex; align-items: center; gap: 22px;
    font: 400 14px/16px var(--font-system); color: var(--label-primary);
  }
  .menubar .apple { font-size: 16px; line-height: 16px; }
  .menubar b { font-weight: 600; }
  .menubar .spacer { flex: 1; }
  .menubar .right { display: flex; align-items: center; gap: 16px; }
  .menubar .right svg { width: 16px; height: 16px; color: var(--label-primary); }

  /* ─── Stage & window ──────────────────────────────────── */
  .stage {
    display: grid; place-items: center;
    padding: 100px 16px 120px;
  }
  .window {
    position: relative;
    width: 900px; height: 600px;
    border-radius: 26px;
    background: #ffffff;
    box-shadow:
      0 22px 60px rgba(0,0,0,0.32),
      0 0 0 0.5px rgba(0,0,0,0.30);
    display: grid;
    grid-template-columns: 240px 1fr;
    overflow: hidden;
    isolation: isolate;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    position: relative;
    background: rgba(118,118,121,0.55);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    padding: 46px 10px 12px;
    display: flex; flex-direction: column; gap: 1px;
    box-shadow: inset -0.5px 0 0 rgba(0,0,0,0.10);
  }
  .lights {
    position: absolute; top: 16px; left: 16px;
    display: flex; gap: 8px; z-index: 3;
  }
  .l { width: 12px; height: 12px; border-radius: 50%;
       box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.18); }
  .close { background: #ff5f57; } .min { background: #febc2e; } .zoom { background: #28c840; }

  .sb-toggle {
    position: absolute; top: 14px; right: 12px;
    width: 24px; height: 20px; border-radius: 5px;
    display: grid; place-items: center;
    color: rgba(0,0,0,0.55); background: transparent; border: 0;
  }
  .sb-toggle svg { width: 17px; height: 14px; }

  .sb-item {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    border-radius: 6px;
    font: 500 13px/18px var(--font-system);
    color: rgba(0,0,0,0.82);
  }
  .sb-item .folder { width: 18px; height: 14px; flex: 0 0 18px; color: rgba(0,0,0,0.55); }
  .sb-item.sel {
    background: rgba(0,0,0,0.20);
    color: rgba(0,0,0,0.95);
  }
  .sb-item.sel .folder { color: #0a84ff; }

  .sb-section {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 10px 4px;
    font: 600 11px/14px var(--font-system); color: rgba(0,0,0,0.55);
    text-transform: none;
  }
  .sb-section svg { width: 10px; height: 10px; color: rgba(0,0,0,0.45); }

  /* ─── Main area + floating toolbar ─── */
  .main {
    position: relative;
    background: #ffffff;
    min-width: 0;
  }
  .toolbar {
    position: absolute;
    top: 14px; left: 18px; right: 18px;
    display: flex; align-items: center; gap: 12px;
    z-index: 2;
  }
  .pill {
    display: inline-flex; align-items: center;
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    padding: 4px 4px;
  }
  .pill .icon {
    width: 30px; height: 24px;
    display: grid; place-items: center;
    color: rgba(0,0,0,0.85);
  }
  .pill .icon.disabled { color: rgba(0,0,0,0.30); }
  .pill .icon svg { width: 14px; height: 14px; }
  .pill .divider {
    width: 1px; height: 16px;
    background: rgba(0,0,0,0.15);
    margin: 0 2px;
  }

  .tb-title {
    font: 700 17px/22px var(--font-display);
    letter-spacing: -0.01em;
    color: var(--label-primary);
    margin: 0 6px;
  }
  .tb-spacer { flex: 1; }

  .search {
    display: inline-flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 12px;
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    width: 180px;
  }
  .search svg { width: 12px; height: 12px; color: rgba(0,0,0,0.40); }
  .search .ph { font: 400 13px/16px var(--font-system); color: rgba(0,0,0,0.40); }

</style>
</head>
<body>

  <!-- Menu bar -->
  <div class="menubar">
    <span class="apple">&#63743;</span>
    <b>Finder</b>
    <span>File</span><span>Edit</span><span>View</span><span>Go</span><span>Window</span><span>Help</span>
    <span class="spacer"></span>
    <div class="right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5a10 10 0 0 1 14 0"/><path d="M8 15.5a6 6 0 0 1 8 0"/><circle cx="12" cy="18.5" r="1" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="8" cy="8.5" r="1.6" fill="currentColor" stroke="none"/><circle cx="16" cy="15.5" r="1.6" fill="currentColor" stroke="none"/></svg>
      <span>Mon Jun 10 &nbsp;9:41 AM</span>
    </div>
  </div>

  <!-- Window -->
  <div class="stage">
    <div class="window">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="lights">
          <span class="l close"></span><span class="l min"></span><span class="l zoom"></span>
        </div>
        <button class="sb-toggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 22 18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="0.7" y="0.7" width="20.6" height="16.6" rx="2.3"/><line x1="8" y1="0.7" x2="8" y2="17.3"/></svg>
        </button>

        <div class="sb-item"><svg class="folder" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 1</div>
        <div class="sb-item sel"><svg class="folder" viewBox="0 0 24 18" fill="currentColor"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 2</div>
        <div class="sb-item"><svg class="folder" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 3</div>
        <div class="sb-item"><svg class="folder" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 4</div>
        <div class="sb-item"><svg class="folder" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 5</div>

        <div class="sb-section">
          Section Header
          <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg>
        </div>

        <div class="sb-item"><svg class="folder" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 6</div>
        <div class="sb-item"><svg class="folder" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg>Folder 7</div>
      </aside>

      <!-- Main with floating toolbar -->
      <div class="main">
        <div class="toolbar">
          <div class="pill">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14,6 8,12 14,18"/></svg></span>
            <span class="divider"></span>
            <span class="icon disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,6 16,12 10,18"/></svg></span>
          </div>

          <span class="tb-title">Folder 2</span>

          <span class="tb-spacer"></span>

          <div class="pill">
            <span class="icon"><svg viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M1 4a2 2 0 0 1 2-2h5l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z"/></svg></span>
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1.2 13.2a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg></span>
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5" rx="1.2"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/><line x1="10" y1="13" x2="14" y2="13"/></svg></span>
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.6l-7 7a2 2 0 0 1-2.8 0L3 13V4a1 1 0 0 1 1-1h9l7.6 7.6a2 2 0 0 1 0 2.8z"/><circle cx="7.5" cy="7.5" r="1.2" fill="currentColor"/></svg></span>
          </div>

          <div class="pill">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5l4 4-11 11H5.5v-4l11-11z"/><path d="M14 6l4 4"/></svg></span>
          </div>

          <label class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            <span class="ph">Search</span>
          </label>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
