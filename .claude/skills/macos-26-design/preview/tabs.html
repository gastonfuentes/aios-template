<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Tabs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css"></head><body>
<style>
.tabs { display:inline-flex; gap:2px; padding:4px; background:rgba(0,0,0,0.04); border-radius:9px; }
.tab { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:6px; font:500 12px/16px var(--font-system); color:var(--label-secondary); cursor:default; min-width:120px; }
.tab.sel { background:#fff; color:var(--label-primary); box-shadow:0 0.5px 0 rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.10); }
.tab .favicon { width:13px; height:13px; border-radius:3px; background:linear-gradient(135deg,#5ac8fa,#0a84ff); flex:0 0 13px; }
.tab .close { width:14px; height:14px; border-radius:50%; display:grid; place-items:center; color:var(--label-tertiary); opacity:0; margin-left:auto; }
.tab.sel:hover .close, .tab:hover .close { opacity:1; }
.tab.new { min-width:auto; color:var(--label-tertiary); padding:5px 8px; }
.tabbar { display:flex; align-items:center; gap:0; background:rgba(0,0,0,0.04); padding:4px 4px 0; border-radius:10px 10px 0 0; width:540px; }
.tabbar .tab { border-radius:7px 7px 0 0; padding:6px 12px; }
.tabbar .tab.sel { background:#fff; box-shadow:none; }
.lbl { font:600 10px/14px var(--font-system); color:var(--label-secondary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
</style>
<div class="stack">
<div><div class="lbl">Toolbar tabs (Safari/Finder style)</div>
<div class="tabs">
  <div class="tab sel"><span class="favicon"></span>Apple — macOS<span class="close">×</span></div>
  <div class="tab"><span class="favicon" style="background:linear-gradient(135deg,#34c759,#86d96b)"></span>Mail<span class="close">×</span></div>
  <div class="tab"><span class="favicon" style="background:linear-gradient(135deg,#ff9f0a,#ffd60a)"></span>Calendar<span class="close">×</span></div>
  <div class="tab new">+</div>
</div></div>

<div><div class="lbl">Window tab bar</div>
<div class="tabbar">
  <div class="tab sel"><span class="favicon"></span>Documents</div>
  <div class="tab"><span class="favicon" style="background:linear-gradient(135deg,#bf5af2,#dc8df5)"></span>Designs</div>
  <div class="tab"><span class="favicon" style="background:linear-gradient(135deg,#ff453a,#ff8a85)"></span>Archive</div>
  <div class="tab new">+</div>
</div>
</div>
</div></body></html>
