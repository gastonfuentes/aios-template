<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Pull-Down Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css"></head><body>
<style>
.pd { display:inline-flex; align-items:center; gap:8px; height:22px; padding:0 8px 0 10px; border-radius:5px; background:#fff; box-shadow:var(--shadow-control); font:500 13px/22px var(--font-system); color:var(--label-primary); }
.pd .chev { color:var(--label-secondary); }
.pd.icon { padding:0 6px; gap:0; width:22px; justify-content:center; }
.pd.prom { background:var(--accent); color:#fff; }
.pd.prom .chev { color:#fff; }
.pd.cap { border-radius:11px; padding:0 6px 0 12px; }
.pd.dis { opacity:.45; }
.menu { background:rgba(245,245,247,0.96); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur); border-radius:8px; padding:4px; box-shadow:var(--shadow-popover); width:200px; margin-top:4px; }
.menu .mi { padding:3px 10px; font:400 13px var(--font-system); border-radius:4px; display:flex; align-items:center; gap:8px; }
.menu .mi:hover { background:var(--accent); color:#fff; }
.menu .sep { height:1px; background:var(--separator); margin:4px 0; }
.menu .mi .k { margin-left:auto; color:var(--label-tertiary); font-size:11px; }
.row { display:flex; align-items:center; gap:14px; }
.lbl { font:600 10px/14px var(--font-system); color:var(--label-secondary); text-transform:uppercase; letter-spacing:.06em; min-width:110px; }
</style>
<div class="stack">
<div class="row"><span class="lbl">Default</span>
  <span class="pd">Action <span class="chev"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg></span></span>
  <span class="pd">Sort by <span class="chev"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg></span></span>
</div>
<div class="row"><span class="lbl">Prominent</span>
  <span class="pd prom">Share <span class="chev"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg></span></span>
</div>
<div class="row"><span class="lbl">Capsule</span>
  <span class="pd cap">View <span class="chev"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg></span></span>
</div>
<div class="row"><span class="lbl">Icon only</span>
  <span class="pd icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg></span>
</div>
<div class="row"><span class="lbl">Disabled</span>
  <span class="pd dis">Action <span class="chev"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg></span></span>
</div>
<div><div class="lbl" style="margin-bottom:6px">Open menu</div>
  <span class="pd">Action <span class="chev"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg></span></span>
  <div class="menu">
    <div class="mi">New Folder<span class="k">⇧⌘N</span></div>
    <div class="mi">New Tab<span class="k">⌘T</span></div>
    <div class="sep"></div>
    <div class="mi">Rename…</div>
    <div class="mi">Duplicate<span class="k">⌘D</span></div>
    <div class="sep"></div>
    <div class="mi" style="color:var(--sys-red)">Move to Trash<span class="k">⌘⌫</span></div>
  </div>
</div>
</div></body></html>
