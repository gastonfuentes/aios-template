<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Window Controls</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #ececec; font-family: var(--font-system); display: flex; flex-direction: column; gap: 16px; }
  .titlebar {
    width: 100%; height: 36px; background: #f5f5f5; border-radius: 12px 12px 0 0;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.10);
  }
  .lights { display: flex; gap: 8px; }
  .l { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.20); }
  .l.close { background: #ff5f57; }
  .l.min   { background: #ffbd2e; }
  .l.zoom  { background: #28c93f; }
  .title { font: 600 13px/16px var(--font-system); color: var(--label-primary); margin-left: 8px; }
  .meta { font: 500 10px/12px var(--font-mono); color: var(--label-tertiary); }
</style>
</head>
<body>
<div class="titlebar">
  <div class="lights"><div class="l close"></div><div class="l min"></div><div class="l zoom"></div></div>
  <span class="title">Window</span>
</div>
<div class="meta">Close #FF5F57 · Minimize #FFBD2E · Zoom #28C93F · 12 px Ø · 8 px gap · 12 px from left edge</div>
</body>
</html>
