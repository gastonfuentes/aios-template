<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Segmented Controls</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css"></head><body>
<style>
.seg { display:inline-flex; padding:2px; background:rgba(0,0,0,0.06); border-radius:7px; box-shadow:var(--shadow-control); }
.seg span { font:500 13px/22px var(--font-system); padding:0 14px; border-radius:5px; color:var(--label-primary); cursor:default; }
.seg .sel { background:#fff; box-shadow:0 0.5px 0 rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.10); }
.seg.lg span { padding:2px 18px; font-size:14px; }
.seg.sm span { padding:0 10px; font-size:12px; }
.seg.icon span { padding:0 10px; display:grid; place-items:center; }
.seg.icon svg { width:13px; height:13px; }
.seg.dark { background:rgba(255,255,255,0.10); }
.seg.dark span { color:rgba(255,255,255,0.85); }
.seg.dark .sel { background:rgba(255,255,255,0.18); box-shadow:0 0.5px 0 rgba(255,255,255,0.15); color:#fff; }
.darkbox { background:#1d1d1f; padding:18px; border-radius:10px; display:inline-block; }
.lbl { font:600 10px/14px var(--font-system); color:var(--label-secondary); text-transform:uppercase; letter-spacing:.06em; min-width:120px; }
</style>
<div class="stack">
<div class="cluster"><span class="lbl">Default</span><span class="seg"><span class="sel">Icons</span><span>List</span><span>Columns</span></span></div>
<div class="cluster"><span class="lbl">Large</span><span class="seg lg"><span class="sel">Today</span><span>Week</span><span>Month</span><span>Year</span></span></div>
<div class="cluster"><span class="lbl">Small</span><span class="seg sm"><span class="sel">All</span><span>Unread</span><span>Flagged</span></span></div>
<div class="cluster"><span class="lbl">Icon only</span><span class="seg icon">
  <span class="sel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="6" height="6"/><rect x="14" y="4" width="6" height="6"/><rect x="4" y="14" width="6" height="6"/><rect x="14" y="14" width="6" height="6"/></svg></span>
  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></span>
  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="6" y1="4" x2="6" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg></span>
</span></div>
<div class="cluster"><span class="lbl">Dark</span><div class="darkbox"><span class="seg dark"><span class="sel">Photos</span><span>Albums</span><span>Shared</span></span></div></div>
</div></body></html>
