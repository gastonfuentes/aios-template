<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Image Wells</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css"></head><body>
<style>
  .well {
    width: 88px; height: 88px;
    border-radius: 10px;
    background: var(--fill-tertiary);
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.18), inset 0 1px 1px rgba(0,0,0,0.06);
    display: grid; place-items: center;
    color: var(--label-tertiary);
    overflow: hidden;
  }
  .well.disabled { opacity: 0.45; }
  .well.filled {
    background-image: linear-gradient(135deg, #ffd1a8, #ff7a59 60%, #c54e8c);
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.18);
  }
  .well.dragover {
    box-shadow: inset 0 0 0 2px var(--accent), inset 0 0 0 0.5px rgba(0,0,0,0.18);
    background: rgba(0,122,255,0.08);
    color: var(--accent);
  }
  .well svg { width: 32px; height: 32px; }
  .label { font: 600 10px/14px var(--font-system); color: var(--label-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px; text-align: center; }

  .well.circle { border-radius: 50%; }
  .well.small { width: 44px; height: 44px; border-radius: 6px; }
  .well.small svg { width: 18px; height: 18px; }
</style>

<div class="row" style="gap: 28px;">
  <div>
    <div class="well"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="1.6"/><path d="M21 17l-6-6-9 8"/></svg></div>
    <div class="label">Empty</div>
  </div>
  <div>
    <div class="well filled"></div>
    <div class="label">Filled</div>
  </div>
  <div>
    <div class="well dragover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><polyline points="7,8 12,3 17,8"/><path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg></div>
    <div class="label">Drag over</div>
  </div>
  <div>
    <div class="well disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="1.6"/><path d="M21 17l-6-6-9 8"/></svg></div>
    <div class="label">Disabled</div>
  </div>
  <div>
    <div class="well circle filled"></div>
    <div class="label">Avatar</div>
  </div>
  <div>
    <div class="well small"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <div class="label">Small</div>
  </div>
</div>
</body></html>
