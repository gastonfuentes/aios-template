<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Tooltips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css"></head>
<body class="tinted">
<style>
  body { padding: 32px 36px; }
  .wrap { display: flex; flex-direction: column; gap: 28px; max-width: 720px; }
  .group { display: flex; flex-direction: column; gap: 14px; }
  .group h3 { margin: 0; font: 700 10px/13px var(--font-system); color: var(--label-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
  .specimens { display: flex; flex-wrap: wrap; gap: 14px 24px; align-items: center; }
  .spec { display: inline-flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .spec .cap { font: 400 10px/13px var(--font-system); color: var(--label-tertiary); }

  .tt {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 7px 2px;
    border-radius: 3px;
    background: rgba(246,246,246,0.82);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.18);
    font: 500 11px/14px var(--font-system);
    color: rgb(55,55,55);
    white-space: nowrap;
  }
  .tt .sh { color: rgba(0,0,0,0.42); font-weight: 500; }
  .tt.dark {
    background: rgba(40,40,40,0.82);
    color: rgba(255,255,255,0.92);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.30), 0 1px 3px rgba(0,0,0,0.28);
  }
  .tt.dark .sh { color: rgba(255,255,255,0.55); }

  /* anchored examples */
  .anchored-row { display: flex; gap: 48px; padding-top: 36px; }
  .anchor {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    height: 26px; padding: 0 12px;
    background: #fff; border-radius: 6px;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.10), 0 1px 1.5px rgba(0,0,0,0.06);
    font: 500 12px/26px var(--font-system); color: var(--label-primary);
  }
  .anchor .tt {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  }
  .anchor .tt::after {
    content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: rgba(246,246,246,0.82);
  }
  .anchor .tt.dark::after { border-top-color: rgba(40,40,40,0.82); }
</style>

<div class="wrap">

  <div class="group">
    <h3>Light</h3>
    <div class="specimens">
      <div class="spec"><span class="tt">This is a tooltip.</span><span class="cap">Default</span></div>
      <div class="spec"><span class="tt">Save Document <span class="sh">⌘ S</span></span><span class="cap">With shortcut</span></div>
      <div class="spec"><span class="tt">Reveals the item in Finder.</span><span class="cap">Description</span></div>
      <div class="spec"><span class="tt">⌥</span><span class="cap">Single glyph</span></div>
    </div>
  </div>

  <div class="group">
    <h3>Dark</h3>
    <div class="specimens">
      <div class="spec"><span class="tt dark">Move to Trash</span><span class="cap">Default</span></div>
      <div class="spec"><span class="tt dark">New Folder <span class="sh">⇧⌘ N</span></span><span class="cap">With shortcut</span></div>
      <div class="spec"><span class="tt dark">Hold ⌥ to duplicate.</span><span class="cap">Hint</span></div>
    </div>
  </div>

  <div class="group">
    <h3>Anchored to Control</h3>
    <div class="anchored-row">
      <span class="anchor">Share <span class="tt">Send a copy…</span></span>
      <span class="anchor">Trash <span class="tt dark">Move to Trash <span class="sh">⌘ ⌫</span></span></span>
      <span class="anchor">Info <span class="tt">Get Info <span class="sh">⌘ I</span></span></span>
    </div>
  </div>

</div>
</body></html>
